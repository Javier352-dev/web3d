<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Habitación</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#inventoryUI{
position:fixed;
top:20px;
right:20px;
width:250px;
height:300px;
background:rgba(0,0,0,0.95);
border:3px solid white;
display:block;
color:white;
padding:15px;
font-family:Arial;
overflow-y:auto;
z-index:1000;
}
#inventoryList{
list-style:none;
padding:0;
}
#inventoryList li{
padding:5px;
border-bottom:1px solid gray;
}
#messageBox{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:15px;
border:2px solid white;
display:none;
font-family:Arial;
z-index:1000;
}
</style>

<script type="importmap">
{
 "imports": {
 "three": "https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.module.js"
 }
}
</script>
</head>
<body>

<div id="inventoryUI">
<h2>Inventario</h2>
<ul id="inventoryList"></ul>
</div>

<div id="messageBox"></div>
<audio id="bgMusic" loop>
  <source src="Home.mp3" type="audio/mpeg">
</audio>
<script type="module">

import * as THREE from "three";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/loaders/GLTFLoader.js";
import { PointerLockControls } from "https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/controls/PointerLockControls.js";

/* ================= INVENTARIO ================= */

const INVENTORY_KEY = "gameInventory";

function initInventory(){
if(!localStorage.getItem(INVENTORY_KEY)){
localStorage.setItem(INVENTORY_KEY, JSON.stringify([]));
}
}

function getInventory(){
initInventory();
return JSON.parse(localStorage.getItem(INVENTORY_KEY));
}

function hasItem(name){
return getInventory().some(item => item.name === name);
}

function addItem(name,image){
const inv = getInventory();
if(!inv.some(item => item.name === name)){
inv.push({name,image});
localStorage.setItem(INVENTORY_KEY, JSON.stringify(inv));
updateInventoryUI();
}
}

function updateInventoryUI(){
const list = document.getElementById("inventoryList");
list.innerHTML="";
const inventory = getInventory();
inventory.forEach(item=>{
const li = document.createElement("li");
li.innerHTML = `<img src="${item.image}" width="20"> ${item.name}`;
list.appendChild(li);
});
}

initInventory();
updateInventoryUI();

/* ================= ESCENA ================= */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
/* ================= MÚSICA ================= */

const music = document.getElementById("bgMusic");
music.volume = 0.8; // volumen (0.0 a 1.0)

document.body.addEventListener("click", () => {
    music.play().catch(()=>{});
});
const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

const controls = new PointerLockControls(camera,document.body);
document.body.addEventListener("click",()=>controls.lock());
scene.add(controls.getObject());
camera.position.set(17,1.6,-1.5 );

const loader = new GLTFLoader();
loader.load("./models/Habitacion.glb",(gltf)=>{ scene.add(gltf.scene); });

/* ================= PERSONAJES ================= */

function loadCharacter(path,x,y,z,rotationY,scale){
loader.load(path,(gltf)=>{
const model=gltf.scene;
model.position.set(x,y,z);
model.scale.set(scale,scale,scale);
model.rotation.y=rotationY;
scene.add(model);
});
}

loadCharacter("./models/Ralsei1.glb",16.7,0,-7.5,Math.PI/-2,0.7);
loadCharacter("./models/Ralsei2.glb",19.88,0.6,-1.80,Math.PI,0.15);

/* ================= CUBO RALSEI ================= */

const ralseiCube = new THREE.Mesh(
new THREE.BoxGeometry(2.5,2.5,2.5),
new THREE.MeshBasicMaterial({transparent:true,opacity:0})
);

ralseiCube.position.set(16.7,1.4,-6.5);
scene.add(ralseiCube);

let ralseiBox = new THREE.Box3();
let playerNearRalsei = false;

/* ================= CUBO PELUCHE ================= */

const pelucheCube = new THREE.Mesh(
new THREE.BoxGeometry(0.5,0.5,0.5),
new THREE.MeshBasicMaterial({ transparent:true,opacity:0 })
);

pelucheCube.position.set(19.89,0.78,-1.8);
scene.add(pelucheCube);

let pelucheBox = new THREE.Box3();
let playerNearPeluche = false;

/* ================= CUBO SALIDA ================= */

const exitCube=new THREE.Mesh(
new THREE.BoxGeometry(2,2,2),
new THREE.MeshBasicMaterial({transparent:true,opacity:0})
);

exitCube.position.set(17,1.6,-1.5);
scene.add(exitCube);

let exitBox = new THREE.Box3();
let playerNearExit=false;

/* ================= TEXTO ================= */

function createTextSprite(text){
const canvas=document.createElement("canvas");
canvas.width=512;
canvas.height=128;
const ctx=canvas.getContext("2d");
ctx.fillStyle="white";
ctx.font="18px Arial";
ctx.fillText(text,50,70);
const texture=new THREE.CanvasTexture(canvas);
const material=new THREE.SpriteMaterial({map:texture});
const sprite=new THREE.Sprite(material);
sprite.scale.set(6,1.5,1);
sprite.visible=false;
scene.add(sprite);
return sprite;
}

const ralseiText=createTextSprite('Presiona "E" para hablar');
ralseiText.position.set(17.7,1.3,-6.5);

const pelucheText=createTextSprite('Presiona "E" para recoger Peluche');
pelucheText.position.set(18.3,1,-1);

const exitText=createTextSprite('Presiona "E" para volver');
exitText.position.set(16,1.2,-1.3);

/* ================= INTERACCIÓN ================= */

document.addEventListener("keydown",(e)=>{
if(e.code==="KeyE"){

if(playerNearRalsei && !hasItem("Llave2")){
const msg=document.getElementById("messageBox");
msg.innerText='H-Hola, e encontrado esta Llave, puede que te sea util ^^.';
msg.style.display="block";
addItem("Llave2","Llave2.png");
setTimeout(()=>{ msg.style.display="none"; },3000);
}

if(playerNearPeluche && !hasItem("Peluche")){
addItem("Peluche","Peluche.jpg");
pelucheCube.visible=false;
const msg=document.getElementById("messageBox");
msg.innerText="Has obtenido un Peluche!";
msg.style.display="block";
setTimeout(()=>{ msg.style.display="none"; },2000);
}

if(playerNearExit){
window.location.href="Casa.html";
}

}
});

/* ================= PAREDES ================= */

const walls=[];
function createWall(x,y,z,w,h,d){
const wall=new THREE.Mesh(
new THREE.BoxGeometry(w,h,d),
new THREE.MeshBasicMaterial({transparent:true,opacity:0})
);
wall.position.set(x,y,z);
scene.add(wall);
walls.push(wall);
}

createWall(12.35,1.5,-3.4,0.5,3,10);
createWall(21.17,1.5,-3,0.5,3,10);
createWall(13.6,1.5,-8,1.5,3,6);
createWall(19.8,1.5,-8,1.5,3,6);
createWall(17,1.5,-7.5,10,3,0.5);
createWall(17,1.5,-0.5,10,3,0.5);
createWall(10.2,1.5,-1.8,10,3,1.3);

/* ================= MOVIMIENTO ================= */

let moveForward=false,moveBackward=false,moveLeft=false,moveRight=false;

document.addEventListener("keydown",(e)=>{
if(e.code==="KeyW") moveForward=true;
if(e.code==="KeyS") moveBackward=true;
if(e.code==="KeyA") moveLeft=true;
if(e.code==="KeyD") moveRight=true;
});

document.addEventListener("keyup",(e)=>{
if(e.code==="KeyW") moveForward=false;
if(e.code==="KeyS") moveBackward=false;
if(e.code==="KeyA") moveLeft=false;
if(e.code==="KeyD") moveRight=false;
});

const playerBox=new THREE.Box3();

function animate(){
requestAnimationFrame(animate);

const speed=0.1;
const player=controls.getObject();
const oldPosition=player.position.clone();

if(moveForward) controls.moveForward(speed);
if(moveBackward) controls.moveForward(-speed);
if(moveLeft) controls.moveRight(-speed);
if(moveRight) controls.moveRight(speed);

playerBox.setFromCenterAndSize(player.position,new THREE.Vector3(1,2,1));

for(let wall of walls){
const wallBox=new THREE.Box3().setFromObject(wall);
if(playerBox.intersectsBox(wallBox)){
player.position.copy(oldPosition);
}
}

ralseiBox.setFromObject(ralseiCube);
playerNearRalsei=playerBox.intersectsBox(ralseiBox);
ralseiText.visible=playerNearRalsei && !hasItem("Llave2");

pelucheBox.setFromObject(pelucheCube);
playerNearPeluche=playerBox.intersectsBox(pelucheBox);
pelucheText.visible=playerNearPeluche && !hasItem("Peluche");

exitBox.setFromObject(exitCube);
playerNearExit=playerBox.intersectsBox(exitBox);
exitText.visible=playerNearExit;

renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
